server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

jwt:
  # Local default prevents startup failure when JWT_SECRET is unset; override in real environments.
  secret: ${JWT_SECRET:dev-only-jwt-secret-change-me-32-plus-chars-long}
  expiration: 86400000

gateway:
  secret: ${GATEWAY_SECRET:your-gateway-secret-change-in-production}

logging:
  level:
    org.springframework.security: INFO
    com.sprintmanagement.authservice: DEBUG
