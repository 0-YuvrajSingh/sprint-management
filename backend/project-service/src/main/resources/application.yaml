server:
  port: 8082

spring:
  application:
    name: project-service

  # Disable Spring Boot's default UserDetails auto-configuration — we use header-based auth.
  security:
    user:
      password: disabled

  datasource:
    url: jdbc:postgresql://localhost:5432/projectdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

# Shared secret validated by HeaderAuthenticationFilter — must match the gateway value.
gateway:
  secret: your-gateway-secret-change-in-production

logging:
  level:
    org.springframework.security: INFO
    com.sprintmanagement.projectservice: DEBUG
