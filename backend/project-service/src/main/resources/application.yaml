server:
  port: 8082

spring:
  application:
    name: project-service

  security:
    user:
      password: disabled
      
  datasource:
    url: jdbc:postgresql://localhost:5432/projectdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

jwt:
  secret: ${JWT_SECRET:your-jwt-secret-change-in-production}

gateway:
  secret: ${GATEWAY_SECRET:your-gateway-secret-change-in-production}

logging:
  level:
    org.springframework.security: INFO
    com.sprintmanagement.projectservice: DEBUG