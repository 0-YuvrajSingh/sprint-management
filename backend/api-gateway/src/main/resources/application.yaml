server:
  port: 8080

spring:
  application:
    name: api-gateway

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    timeout: 2s

  # Disable Spring Boot's default UserDetails auto-configuration — we use JWT auth.
  security:
    user:
      password: disabled

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:

        # ─── AUTH SERVICE (public) ───────────────────────────────────────────
        - id: auth-service-login
          uri: lb://auth-service
          predicates:
            - Path=/auth/login
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/auth/login, /api/v1/auth/login

        - id: auth-service-register
          uri: lb://auth-service
          predicates:
            - Path=/auth/register
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/auth/register, /api/v1/auth/register

        # ─── AUTH SERVICE (protected — any other /auth/** route) ─────────────
        - id: auth-service-protected
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/auth/(?<segment>.*), /api/v1/auth/${segment}

        # ─── PROJECT SERVICE ─────────────────────────────────────────────────
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/projects/(?<segment>.*), /api/v1/projects/${segment}

        # ─── SPRINT SERVICE ──────────────────────────────────────────────────
        - id: sprint-service
          uri: lb://sprint-service
          predicates:
            - Path=/api/sprints/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/sprints/(?<segment>.*), /api/v1/sprints/${segment}

        # ─── STORIES SERVICE ─────────────────────────────────────────────────
        - id: stories-service
          uri: lb://stories-service
          predicates:
            - Path=/api/stories/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/stories/(?<segment>.*), /api/v1/stories/${segment}

        # ─── USER SERVICE ────────────────────────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/users/(?<segment>.*), /api/v1/users/${segment}

        # ─── ACTIVITY SERVICE ────────────────────────────────────────────────────
        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/activities/(?<segment>.*), /api/v1/activities/${segment}

# ─── EUREKA ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ─── SECRETS (move to env vars in production) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

gateway:
  secret: ${GATEWAY_SECRET}

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.example.api_gateway: DEBUG
