server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Disable Spring Boot's default UserDetails auto-configuration — we use JWT auth.
  security:
    user:
      password: disabled

  cloud:
    gateway:
      routes:

        # ─── AUTH SERVICE (public) ───────────────────────────────────────────
        - id: auth-service-login
          uri: lb://auth-service
          predicates:
            - Path=/auth/login
          filters:
            - RewritePath=/auth/login, /api/v1/auth/login

        - id: auth-service-register
          uri: lb://auth-service
          predicates:
            - Path=/auth/register
          filters:
            - RewritePath=/auth/register, /api/v1/auth/register

        # ─── AUTH SERVICE (protected — any other /auth/** route) ─────────────
        - id: auth-service-protected
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /api/v1/auth/${segment}

        # ─── PROJECT SERVICE ─────────────────────────────────────────────────
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**

        # ─── SPRINT SERVICE ──────────────────────────────────────────────────
        - id: sprint-service
          uri: lb://sprint-service
          predicates:
            - Path=/api/sprints/**

        # ─── STORIES SERVICE ─────────────────────────────────────────────────
        - id: stories-service
          uri: lb://stories-service
          predicates:
            - Path=/api/stories/**

        # ─── USER SERVICE ────────────────────────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        # ─── ACTIVITY SERVICE ────────────────────────────────────────────────────
        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**

# ─── EUREKA ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ─── SECRETS (move to env vars in production) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-change-in-production}

gateway:
  secret: ${GATEWAY_SECRET:your-gateway-secret-change-in-production}

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.sprintmanagement.gateway: DEBUG