server:
  port: 8083

spring:
  application:
    name: user-service

  # Disable Spring Boot's default UserDetails auto-configuration — we use header-based auth.
  security:
    user:
      password: disabled

  datasource:
    url: jdbc:postgresql://localhost:5432/usersdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ─── EUREKA ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ─── OPENAPI ─────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

# ─── SECRETS (move to env vars in production) ────────────────────────────────
gateway:
  secret: ${GATEWAY_SECRET:your-gateway-secret-change-in-production}

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.security: INFO
    com.sprintmanagement.userservice: DEBUG
