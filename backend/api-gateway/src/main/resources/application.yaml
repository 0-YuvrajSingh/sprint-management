server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    timeout: 2s

  # Disable Spring Boot's default UserDetails auto-configuration — we use JWT auth.
  security:
    user:
      password: disabled

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:

        # ─── AUTH SERVICE (public) ───────────────────────────────────────────
        - id: auth-service-login-v1
          order: -20
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/login
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@userKeyResolver}'
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: auth-service-login
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/login
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@userKeyResolver}'
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
            - RewritePath=/auth/login,/api/v1/auth/login

        - id: auth-service-register
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/register,/api/v1/auth/register
          filters:
            - RewritePath=/auth/register,/api/v1/auth/register

        - id: auth-service-refresh
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/refresh,/api/v1/auth/refresh
          filters:
            - RewritePath=/auth/refresh,/api/v1/auth/refresh

        - id: auth-service-logout
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/logout,/api/v1/auth/logout
          filters:
            - RewritePath=/auth/logout,/api/v1/auth/logout

        # ─── AUTH SERVICE (protected — any other /auth/** route) ─────────────
        - id: auth-service-protected
          order: 10
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth(?<segment>/?.*),/api/v1/auth$\{segment}

        - id: auth-service-protected-v1
          order: 10
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        # ─── PROJECT SERVICE ─────────────────────────────────────────────────
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**,/api/v1/projects/**
          metadata:
            requiredRoles: ADMIN,MANAGER,DEVELOPER,VIEWER
          filters:
            - RewritePath=/api/projects(?<segment>/?.*),/api/v1/projects$\{segment}

        # ─── SPRINT SERVICE ──────────────────────────────────────────────────
        - id: sprint-service
          uri: lb://sprint-service
          predicates:
            - Path=/api/sprints/**,/api/v1/sprints/**
          filters:
            - RewritePath=/api/sprints(?<segment>/?.*),/api/v1/sprints$\{segment}

        # ─── STORIES SERVICE ─────────────────────────────────────────────────
        - id: stories-service
          uri: lb://stories-service
          predicates:
            - Path=/api/stories/**,/api/v1/stories/**
          filters:
            - RewritePath=/api/stories(?<segment>/?.*),/api/v1/stories$\{segment}

        # ─── USER SERVICE ────────────────────────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/v1/users/**,/api/admin/**,/api/v1/admin/**
          metadata:
            requiredRoles: ADMIN
          filters:
            - RewritePath=/api/users(?<segment>/?.*),/api/v1/users$\{segment}

        # ─── ACTIVITY SERVICE ────────────────────────────────────────────────────
        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**,/api/v1/activities/**
          filters:
            - RewritePath=/api/activities(?<segment>/?.*),/api/v1/activities$\{segment}

# ─── EUREKA ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ─── SECRETS (move to env vars in production) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

gateway:
  secret: ${GATEWAY_SECRET}

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.sprintmanagement.apigateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

