server:
  port: 8085

spring:
  application:
    name: activity-service

  # Disable Spring Boot's default UserDetails auto-configuration — we use header-based auth.
  security:
    user:
      password: disabled

  datasource:
    url: jdbc:postgresql://localhost:5432/activity_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

# Shared secret validated by HeaderAuthenticationFilter — must match the gateway value.
gateway:
  secret: ${GATEWAY_SECRET:your-gateway-secret-change-in-production}

logging:
  level:
    org.springframework.security: INFO
    com.sprintmanagement.activityservice: DEBUG
