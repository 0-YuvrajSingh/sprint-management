server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    timeout: 2s

  # Disable Spring Boot's default UserDetails auto-configuration — we use JWT auth.
  security:
    user:
      password: disabled

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:

        # ─── AUTH SERVICE (public) ───────────────────────────────────────────
        - id: auth-service-login
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/login
          filters:
            - RewritePath=/auth/login,/api/v1/auth/login

        - id: auth-service-register
          order: -10
          uri: lb://auth-service
          predicates:
            - Path=/auth/register
          filters:
            - RewritePath=/auth/register,/api/v1/auth/register

        # ─── AUTH SERVICE (protected — any other /auth/** route) ─────────────
        - id: auth-service-protected
          order: 10
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
            - Header=Authorization, Bearer .+
          filters:
            - RewritePath=/auth(?<segment>/?.*),/api/v1/auth$\{segment}

        # ─── PROJECT SERVICE ─────────────────────────────────────────────────
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**
          filters:
            - RewritePath=/api/projects(?<segment>/?.*),/api/v1/projects$\{segment}

        # ─── SPRINT SERVICE ──────────────────────────────────────────────────
        - id: sprint-service
          uri: lb://sprint-service
          predicates:
            - Path=/api/sprints/**
          filters:
            - RewritePath=/api/sprints(?<segment>/?.*),/api/v1/sprints$\{segment}

        # ─── STORIES SERVICE ─────────────────────────────────────────────────
        - id: stories-service
          uri: lb://stories-service
          predicates:
            - Path=/api/stories/**
          filters:
            - RewritePath=/api/stories(?<segment>/?.*),/api/v1/stories$\{segment}

        # ─── USER SERVICE ────────────────────────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*),/api/v1/users$\{segment}

        # ─── ACTIVITY SERVICE ────────────────────────────────────────────────────
        - id: activity-service
          uri: lb://activity-service
          predicates:
            - Path=/api/activities/**
          filters:
            - RewritePath=/api/activities(?<segment>/?.*),/api/v1/activities$\{segment}

# ─── EUREKA ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ─── SECRETS (move to env vars in production) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

gateway:
  secret: ${GATEWAY_SECRET}

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.example.api_gateway: DEBUG
