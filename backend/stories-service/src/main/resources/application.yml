debug: ${APP_DEBUG:true}

server:
  port: 8086

spring:
  application:
    name: stories-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  security:
    user:
      password: disabled
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  default-produces-media-type: application/json

gateway:
  secret: ${GATEWAY_SECRET}

audit:
  activity-service-url: ${ACTIVITY_SERVICE_URL:http://activity-service}

logging:
  level:
    com.sprintmanagement.storiesservice: DEBUG
